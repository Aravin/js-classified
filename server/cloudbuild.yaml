steps:
  # Build the Docker image with cache optimization
  # Build from root directory to access both server/ and db/ directories
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/locful-api:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/locful-api:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/locful-api:latest'
      - '-f'
      - 'server/Dockerfile'
      - '.'
    # No 'dir' specified - build from repo root

  # Push both tags (they run after build step automatically)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/locful-api:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/locful-api:latest'

  # Deploy to Cloud Run automatically after build
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'locful-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/locful-api:$SHORT_SHA'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--allow-unauthenticated'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL:latest,CLOUDINARY_CLOUD_NAME=CLOUDINARY_CLOUD_NAME:latest,CLOUDINARY_API_KEY=CLOUDINARY_API_KEY:latest,CLOUDINARY_API_SECRET=CLOUDINARY_API_SECRET:latest,AUTH0_DOMAIN=AUTH0_DOMAIN:latest,AUTH0_CLIENT_ID=AUTH0_CLIENT_ID:latest,AUTH0_AUDIENCE=AUTH0_AUDIENCE:latest,SENDGRID_API_KEY=SENDGRID_API_KEY:latest,EMAIL_FROM=EMAIL_FROM:latest,EMAIL_TO=EMAIL_TO:latest,CRON_JOB_SECRET=CRON_JOB_SECRET:latest,VIEWER_KEY_SECRET=VIEWER_KEY_SECRET:latest,FIRECRAWL_API_KEY=FIRECRAWL_API_KEY:latest'
      - '--set-env-vars'
      - '^|^EMAIL_ENABLED=true|EMAIL_PROVIDER=sendgrid|CRON_DAILY_REPORT_ENABLED=true|CRON_DAILY_REPORT_TIME=30 14 * * *|CORS_ORIGIN=https://locful.com,https://www.locful.com|LISTING_INACTIVE_DAYS=30|LISTING_DELETE_DAYS=45|CRAWLER_ENABLED=true|CRAWLER_SUPPORTED_SITES=olx|SHOW_CRAWLED_ITEMS=true|FIRECRAWL_MONTHLY_LIMIT=950|FIRECRAWL_MAX_ITEMS_PER_RUN=3|CRAWLER_MAX_IMAGES_PER_LISTING=2'

  # Ensure Cloud Scheduler jobs exist for crawl and cleanup-listings
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail

        REGION='asia-southeast1'
        SCHEDULER_LOCATION='asia-southeast1'
        SERVICE_NAME='locful-api'
        SCHEDULER_SA="scheduler-invoker@${PROJECT_ID}.iam.gserviceaccount.com"
        SERVICE_URL="$(gcloud run services describe "${SERVICE_NAME}" --region "${REGION}" --format='value(status.url)')"
        CRON_SECRET="$(gcloud secrets versions access latest --secret=CRON_JOB_SECRET)"

        if ! gcloud iam service-accounts describe "${SCHEDULER_SA}" >/dev/null 2>&1; then
          gcloud iam service-accounts create scheduler-invoker --display-name='Cloud Scheduler invoker'
        fi

        gcloud run services add-iam-policy-binding "${SERVICE_NAME}" \
          --region "${REGION}" \
          --member="serviceAccount:${SCHEDULER_SA}" \
          --role='roles/run.invoker'

        upsert_scheduler_job() {
          local name="$1"
          local schedule="$2"
          local uri="$3"

          if gcloud scheduler jobs describe "${name}" --location "${SCHEDULER_LOCATION}" >/dev/null 2>&1; then
            gcloud scheduler jobs update http "${name}" \
              --location "${SCHEDULER_LOCATION}" \
              --schedule "${schedule}" \
              --time-zone 'Etc/UTC' \
              --uri "${uri}" \
              --http-method POST \
              --headers "Content-Type=application/json,X-Cron-Secret=${CRON_SECRET}" \
              --message-body '{}' \
              --oidc-service-account-email "${SCHEDULER_SA}" \
              --oidc-token-audience "${SERVICE_URL}"
          else
            gcloud scheduler jobs create http "${name}" \
              --location "${SCHEDULER_LOCATION}" \
              --schedule "${schedule}" \
              --time-zone 'Etc/UTC' \
              --uri "${uri}" \
              --http-method POST \
              --headers "Content-Type=application/json,X-Cron-Secret=${CRON_SECRET}" \
              --message-body '{}' \
              --oidc-service-account-email "${SCHEDULER_SA}" \
              --oidc-token-audience "${SERVICE_URL}"
          fi
        }

        upsert_scheduler_job 'locful-crawl' '30 19 * * *' "${SERVICE_URL}/internal/cron/crawl"
        upsert_scheduler_job 'locful-cleanup-listings' '30 20 * * *' "${SERVICE_URL}/internal/cron/cleanup-listings"

images:
  - 'gcr.io/$PROJECT_ID/locful-api:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/locful-api:latest'

options:
  # Use faster machine type if you have quota (significantly speeds up builds)
  # machineType: 'E2_HIGHCPU_2'  # 2 vCPU - much faster than default
  # machineType: 'E2_HIGHCPU_8'  # 8 vCPU - even faster (if you have quota)
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'  # Reduced from 1200s since builds should be faster now
