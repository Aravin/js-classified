steps:
  # Build the Docker image with cache optimization
  # Build from root directory to access both server/ and db/ directories
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/locful-api:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/locful-api:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/locful-api:latest'
      - '-f'
      - 'server/Dockerfile'
      - '.'
    # No 'dir' specified - build from repo root

  # Push both tags (they run after build step automatically)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/locful-api:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/locful-api:latest'

  # Deploy to Cloud Run automatically after build
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'locful-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/locful-api:$SHORT_SHA'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--allow-unauthenticated'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL:latest,CLOUDINARY_CLOUD_NAME=CLOUDINARY_CLOUD_NAME:latest,CLOUDINARY_API_KEY=CLOUDINARY_API_KEY:latest,CLOUDINARY_API_SECRET=CLOUDINARY_API_SECRET:latest,AUTH0_DOMAIN=AUTH0_DOMAIN:latest,AUTH0_CLIENT_ID=AUTH0_CLIENT_ID:latest,AUTH0_AUDIENCE=AUTH0_AUDIENCE:latest,SENDGRID_API_KEY=SENDGRID_API_KEY:latest,EMAIL_FROM=EMAIL_FROM:latest,EMAIL_TO=EMAIL_TO:latest,CRON_JOB_SECRET=CRON_JOB_SECRET:latest'
      - '--set-env-vars'
      - 'EMAIL_ENABLED=true,EMAIL_PROVIDER=sendgrid,CRON_DAILY_REPORT_ENABLED=true,CRON_DAILY_REPORT_TIME=30 14 * * *'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail

        SERVICE_URL=$(gcloud run services describe locful-api --region=asia-southeast1 --format='value(status.url)')
        SECRET=$(gcloud secrets versions access latest --secret=CRON_JOB_SECRET)
        JOB_NAME=daily-statistics-report

        if ! gcloud scheduler jobs describe "${JOB_NAME}" >/dev/null 2>&1; then
          gcloud scheduler jobs create http "${JOB_NAME}" \
            --schedule="30 14 * * *" \
            --time-zone="UTC" \
            --uri="${SERVICE_URL}/internal/cron/daily-statistics" \
            --http-method=POST \
            --headers="Content-Type=application/json,X-Cron-Secret=${SECRET}" \
            --oidc-service-account-email="scheduler-invoker@${PROJECT_ID}.iam.gserviceaccount.com" \
            --oidc-token-audience="${SERVICE_URL}"
        else
          gcloud scheduler jobs update http "${JOB_NAME}" \
            --schedule="30 14 * * *" \
            --time-zone="UTC" \
            --uri="${SERVICE_URL}/internal/cron/daily-statistics" \
            --http-method=POST \
            --headers="Content-Type=application/json,X-Cron-Secret=${SECRET}" \
            --oidc-service-account-email="scheduler-invoker@${PROJECT_ID}.iam.gserviceaccount.com" \
            --oidc-token-audience="${SERVICE_URL}"
        fi

images:
  - 'gcr.io/$PROJECT_ID/locful-api:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/locful-api:latest'

options:
  # Use faster machine type if you have quota (significantly speeds up builds)
  # machineType: 'E2_HIGHCPU_2'  # 2 vCPU - much faster than default
  # machineType: 'E2_HIGHCPU_8'  # 8 vCPU - even faster (if you have quota)
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'  # Reduced from 1200s since builds should be faster now

